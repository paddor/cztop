  </defs>
  <rect width="480" height="320" fill="#0e0e14"/>
  <!-- Binary/hex rain representing raw message data in transit -->
  <g font-family="'Courier New',monospace" font-size="10" opacity="0.12" fill="#e8423f">
    <text x="20" y="20">01</text><text x="20" y="35">AF</text><text x="20" y="50">00</text>
    <text x="20" y="65">7E</text><text x="20" y="80">01</text><text x="20" y="95">FF</text>
    <text x="60" y="30">C3</text><text x="60" y="45">01</text><text x="60" y="60">D8</text>
    <text x="60" y="75">00</text><text x="60" y="90">4B</text>
    <text x="100" y="15">00</text><text x="100" y="30">01</text><text x="100" y="45">E7</text>
    <text x="100" y="60">FF</text>
    <text x="360" y="25">8A</text><text x="360" y="40">01</text><text x="360" y="55">00</text>
    <text x="360" y="70">3C</text><text x="360" y="85">FE</text>
    <text x="400" y="20">01</text><text x="400" y="35">B2</text><text x="400" y="50">00</text>
    <text x="400" y="65">01</text><text x="400" y="80">9D</text><text x="400" y="95">00</text>
    <text x="440" y="30">FF</text><text x="440" y="45">01</text><text x="440" y="60">A0</text>
    <text x="440" y="75">00</text>
    <!-- Bottom rain -->
    <text x="30" y="240">01</text><text x="30" y="255">00</text><text x="30" y="270">E3</text>
    <text x="70" y="250">FF</text><text x="70" y="265">01</text><text x="70" y="280">00</text>
    <text x="380" y="235">01</text><text x="380" y="250">7F</text><text x="380" y="265">00</text>
    <text x="420" y="245">D4</text><text x="420" y="260">01</text><text x="420" y="275">FF</text>
    <text x="450" y="240">00</text><text x="450" y="255">01</text><text x="450" y="270">B8</text>
  </g>
  <!-- Sunglasses -->
  <g transform="translate(240, 82)">
    <path d="M-15,0 Q0,-10 15,0" fill="none" stroke="#ddd" stroke-width="4.5"/>
    <ellipse cx="-48" cy="5" rx="42" ry="30" fill="url(#lens)" stroke="#bbb" stroke-width="3"/>
    <ellipse cx="48" cy="5" rx="42" ry="30" fill="url(#lens)" stroke="#bbb" stroke-width="3"/>
    <ellipse cx="-60" cy="-5" rx="10" ry="6" fill="#fff" opacity="0.08" transform="rotate(-20,-60,-5)"/>
    <ellipse cx="36" cy="-5" rx="10" ry="6" fill="#fff" opacity="0.08" transform="rotate(-20,36,-5)"/>
    <line x1="-90" y1="0" x2="-105" y2="-8" stroke="#bbb" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="0" x2="105" y2="-8" stroke="#bbb" stroke-width="3" stroke-linecap="round"/>
    <!-- Binary in lenses -->
    <g font-family="'Courier New',monospace" font-size="7" fill="#e8423f" opacity="0.3">
