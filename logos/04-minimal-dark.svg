<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#111"/>
  <!-- Minimal mesh -->
  <g stroke="#333" stroke-width="0.5">
    <line x1="80" y1="60" x2="400" y2="60"/>
    <line x1="80" y1="60" x2="80" y2="260"/>
    <line x1="400" y1="60" x2="400" y2="260"/>
    <line x1="80" y1="260" x2="400" y2="260"/>
    <line x1="80" y1="60" x2="400" y2="260"/>
    <line x1="400" y1="60" x2="80" y2="260"/>
  </g>
  <!-- Nodes -->
  <circle cx="80" cy="60" r="4" fill="#e8423f"/>
  <circle cx="400" cy="60" r="4" fill="#e8423f"/>
  <circle cx="80" cy="260" r="4" fill="#e8423f"/>
  <circle cx="400" cy="260" r="4" fill="#e8423f"/>
  <!-- Tiny envelopes on lines -->
  <rect x="220" y="56" width="10" height="7" rx="1" fill="#e8423f" opacity="0.7"/>
  <rect x="160" y="180" width="8" height="6" rx="1" fill="#e8423f" opacity="0.5" transform="rotate(45, 164, 183)"/>
  <!-- Text -->
  <text x="240" y="165" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="72" font-weight="300" fill="#fff" letter-spacing="8">CZTop</text>
  <!-- Subtle beard lines under Z -->
  <g stroke="#e8423f" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="198" y1="172" x2="194" y2="195"/>
    <line x1="206" y1="172" x2="204" y2="198"/>
    <line x1="214" y1="172" x2="214" y2="200"/>
    <line x1="222" y1="172" x2="224" y2="198"/>
    <line x1="230" y1="172" x2="234" y2="195"/>
  </g>
  <text x="240" y="240" text-anchor="middle" font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="11" fill="#555" letter-spacing="6">ZEROMQ FOR RUBY</text>
</svg>
