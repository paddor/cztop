<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="40%" stop-color="#111"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#aa1111"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="480" height="320" fill="#f5f0e8"/>
  <!-- Subtle paper texture -->
  <g opacity="0.03">
    <line x1="0" y1="10" x2="480" y2="10" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="30" x2="480" y2="30" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="480" y2="50" stroke="#000" stroke-width="0.5"/>
    <line x1="0" y1="70" x2="480" y2="70" stroke="#000" stroke-width="0.5"/>
  </g>
  <!-- ZZ Top style sunglasses -->
  <g transform="translate(240, 100)" filter="url(#shadow)">
    <!-- Bridge -->
    <path d="M-15,0 Q0,-8 15,0" fill="none" stroke="#222" stroke-width="4"/>
    <!-- Left lens -->
    <ellipse cx="-45" cy="5" rx="38" ry="28" fill="url(#lens)" stroke="#222" stroke-width="3"/>
    <!-- Right lens -->
    <ellipse cx="45" cy="5" rx="38" ry="28" fill="url(#lens)" stroke="#222" stroke-width="3"/>
    <!-- Lens shine -->
    <ellipse cx="-55" cy="-5" rx="8" ry="5" fill="#fff" opacity="0.15" transform="rotate(-20, -55, -5)"/>
    <ellipse cx="35" cy="-5" rx="8" ry="5" fill="#fff" opacity="0.15" transform="rotate(-20, 35, -5)"/>
    <!-- Arms -->
    <line x1="-83" y1="0" x2="-95" y2="-5" stroke="#222" stroke-width="3" stroke-linecap="round"/>
    <line x1="83" y1="0" x2="95" y2="-5" stroke="#222" stroke-width="3" stroke-linecap="round"/>
    <!-- Reflected network nodes in lenses -->
    <g opacity="0.3">
      <circle cx="-60" cy="-5" r="2" fill="#e8423f"/>
      <circle cx="-30" cy="-5" r="2" fill="#e8423f"/>
      <circle cx="-60" cy="15" r="2" fill="#e8423f"/>
      <circle cx="-30" cy="15" r="2" fill="#e8423f"/>
      <line x1="-60" y1="-5" x2="-30" y2="-5" stroke="#e8423f" stroke-width="0.5"/>
      <line x1="-60" y1="15" x2="-30" y2="15" stroke="#e8423f" stroke-width="0.5"/>
      <line x1="-60" y1="-5" x2="-60" y2="15" stroke="#e8423f" stroke-width="0.5"/>
      <line x1="-30" y1="-5" x2="-30" y2="15" stroke="#e8423f" stroke-width="0.5"/>
    </g>
  </g>
  <!-- Big beard -->
  <g transform="translate(240, 135)">
    <g stroke="url(#redGrad)" stroke-width="3" stroke-linecap="round">
      <line x1="-50" y1="0" x2="-65" y2="55"/><line x1="-38" y1="0" x2="-48" y2="62"/>
      <line x1="-26" y1="0" x2="-32" y2="68"/><line x1="-14" y1="0" x2="-16" y2="72"/>
      <line x1="-2" y1="0" x2="-2" y2="74"/><line x1="10" y1="0" x2="12" y2="72"/>
      <line x1="22" y1="0" x2="28" y2="68"/><line x1="34" y1="0" x2="44" y2="62"/>
      <line x1="46" y1="0" x2="61" y2="55"/>
    </g>
  </g>
  <!-- Text below beard -->
  <text x="240" y="240" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="52" font-weight="900" fill="#222" letter-spacing="4">CZTop</text>
  <text x="240" y="270" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="12" fill="#888" letter-spacing="3">ZEROMQ FOR RUBY</text>
  <!-- Small message envelopes -->
  <g opacity="0.6">
    <g transform="translate(380, 180)">
      <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#e8423f"/>
      <polyline points="-6,-4 0,1 6,-4" fill="none" stroke="#fff" stroke-width="0.8"/>
    </g>
    <g transform="translate(100, 200)">
      <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#e8423f"/>
      <polyline points="-6,-4 0,1 6,-4" fill="none" stroke="#fff" stroke-width="0.8"/>
    </g>
  </g>
</svg>
