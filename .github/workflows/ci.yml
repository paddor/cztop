name: CI

on: [push, pull_request]

jobs:
  stable:
    name: Ruby ${{ matrix.ruby }} (stable API)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install CZMQ
      run: sudo apt-get install -y libczmq-dev
    - name: Install dependencies
      run: bundle install
    - name: Run tests
      run: bundle exec rake

  draft:
    name: Ruby ${{ matrix.ruby }} (draft API)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install ZMQ and CZMQ from source (with draft APIs)
      run: |
        export PKG_CONFIG_PATH=$HOME/lib/pkgconfig
        env ZMQ_VERSION=v4.3.5 ci/install-libzmq
        env CZMQ_VERSION=v4.2.1 ci/install-libczmq
    - name: Install dependencies
      run: bundle install
    - name: Debug draft socket fds
      run: |
        export LD_LIBRARY_PATH=$HOME/lib
        echo "=== Library check ==="
        ldd $HOME/lib/libczmq.so | grep zmq || true
        ls -la $HOME/lib/libzmq* || true
        ldconfig -p | grep -i zmq || true
        echo
        bundle exec ruby -e '
          require "ffi"
          require_relative "lib/cztop"

          puts "ZMQ: #{CZMQ::FFI::ZMQ_VERSION}"
          puts "CZMQ: #{CZMQ::FFI::CZMQ_VERSION}"
          puts "has_draft?: #{CZMQ::FFI.has_draft?}"
          puts "ffi_libraries: #{CZMQ::FFI.ffi_libraries.map { |l| "#{l.name}" }}"

          # Check /proc maps for actual loaded libraries
          maps = File.read("/proc/self/maps")
          zmq_libs = maps.lines.select { |l| l.include?("zmq") || l.include?("czmq") }.map { |l| l.strip.split.last }.uniq
          puts "Loaded libraries: #{zmq_libs}"
          puts

          %w[REQ SERVER].each do |type|
            begin
              klass = CZTop::Socket.const_get(type)
              s = klass.new
              zsock_ptr = s.ffi_delegate.to_ptr

              resolved = CZMQ::FFI.zsock_resolve(zsock_ptr)
              fd_via_czmq = CZMQ::FFI.zsock_fd(zsock_ptr)
              errno_after = CZMQ::FFI.zmq_errno
              puts "#{type}: fd=#{fd_via_czmq} errno=#{errno_after} (#{CZMQ::FFI.zmq_strerror(errno_after)})"

              s.close
            rescue => e
              puts "#{type}: ERROR #{e.class}: #{e.message}"
            end
          end
        '
    - name: Run tests
      run: |
        export LD_LIBRARY_PATH=$HOME/lib
        bundle exec rake
