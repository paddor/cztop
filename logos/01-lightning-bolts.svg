<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="40%" stop-color="#111"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="480" height="320" fill="#f5f0e8"/>
  <!-- ZZ Top sunglasses -->
  <g transform="translate(240, 82)" filter="url(#shadow)">
    <path d="M-15,0 Q0,-10 15,0" fill="none" stroke="#222" stroke-width="5"/>
    <ellipse cx="-48" cy="5" rx="42" ry="30" fill="url(#lens)" stroke="#222" stroke-width="3.5"/>
    <ellipse cx="48" cy="5" rx="42" ry="30" fill="url(#lens)" stroke="#222" stroke-width="3.5"/>
    <ellipse cx="-60" cy="-5" rx="10" ry="6" fill="#fff" opacity="0.12" transform="rotate(-20,-60,-5)"/>
    <ellipse cx="36" cy="-5" rx="10" ry="6" fill="#fff" opacity="0.12" transform="rotate(-20,36,-5)"/>
    <line x1="-90" y1="0" x2="-105" y2="-8" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="90" y1="0" x2="105" y2="-8" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Lightning bolts reflected in lenses -->
    <g opacity="0.3">
      <polygon points="-58,-8 -50,-2 -56,-2 -48,8 -52,2 -58,2" fill="#ffcc00"/>
      <polygon points="38,-8 46,-2 40,-2 48,8 44,2 38,2" fill="#ffcc00"/>
    </g>
  </g>
  <!-- Thick long beard -->
  <g transform="translate(240, 118)">
    <g stroke="url(#redGrad)" stroke-linecap="round" fill="none">
      <!-- Dense outer left strands -->
      <path d="M-70,0 Q-78,50 -85,105 Q-88,130 -82,150" stroke-width="3.5"/>
      <path d="M-62,2 Q-68,55 -73,110 Q-76,140 -70,158" stroke-width="3.5"/>
      <path d="M-54,4 Q-58,58 -62,115 Q-64,148 -58,165" stroke-width="4"/>
      <!-- Dense middle-left strands -->
      <path d="M-46,5 Q-48,60 -50,118 Q-52,152 -47,172" stroke-width="4"/>
      <path d="M-38,6 Q-38,65 -40,122 Q-41,158 -37,178" stroke-width="4.5"/>
      <path d="M-30,7 Q-28,68 -30,125 Q-31,162 -28,182" stroke-width="4.5"/>
      <!-- Center strands (longest) -->
      <path d="M-22,7 Q-20,72 -22,130 Q-23,168 -20,188" stroke-width="5"/>
      <path d="M-14,8 Q-12,75 -14,132 Q-14,172 -12,192" stroke-width="5"/>
      <path d="M-6,8 Q-4,76 -6,134 Q-6,174 -5,194" stroke-width="5"/>
      <path d="M2,8 Q4,76 2,134 Q2,174 3,194" stroke-width="5"/>
      <path d="M10,8 Q12,75 10,132 Q10,172 12,192" stroke-width="5"/>
      <path d="M18,7 Q20,72 18,130 Q19,168 20,188" stroke-width="5"/>
      <!-- Dense middle-right strands -->
      <path d="M26,7 Q28,68 26,125 Q27,162 28,182" stroke-width="4.5"/>
      <path d="M34,6 Q36,65 34,122 Q35,158 37,178" stroke-width="4.5"/>
      <path d="M42,5 Q44,60 42,118 Q44,152 47,172" stroke-width="4"/>
      <!-- Dense outer right strands -->
      <path d="M50,4 Q54,58 52,115 Q56,148 58,165" stroke-width="4"/>
      <path d="M58,2 Q64,55 60,110 Q68,140 70,158" stroke-width="3.5"/>
      <path d="M66,0 Q72,50 68,105 Q78,130 82,150" stroke-width="3.5"/>
    </g>
  </g>
  <!-- Lightning bolts on sides representing ZMQ's speed -->
  <g fill="#ffcc00" opacity="0.7">
    <!-- Left bolt -->
    <polygon points="55,60 72,88 62,88 78,120 68,120 90,160 60,112 72,112 52,82 64,82"/>
    <!-- Right bolt -->
    <polygon points="425,60 408,88 418,88 402,120 412,120 390,160 420,112 408,112 428,82 416,82"/>
  </g>
  <!-- Text -->
  <text x="240" y="282" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif"
        font-size="48" font-weight="900" fill="#222" letter-spacing="3">CZTop</text>
  <text x="240" y="305" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="11" fill="#888" letter-spacing="3">ZEROMQ FOR RUBY</text>
</svg>
