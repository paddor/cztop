name: CI

on: [push, pull_request]

jobs:
  stable:
    name: Ruby ${{ matrix.ruby }} (stable API)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install CZMQ
      run: sudo apt-get install -y libczmq-dev
    - name: Install dependencies
      run: bundle install
    - name: Run tests
      run: bundle exec rake

  draft:
    name: Ruby ${{ matrix.ruby }} (draft API)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install ZMQ and CZMQ from source (with draft APIs)
      run: |
        export PKG_CONFIG_PATH=$HOME/lib/pkgconfig
        env ZMQ_VERSION=v4.3.5 ci/install-libzmq
        env CZMQ_VERSION=v4.2.1 ci/install-libczmq
    - name: Install dependencies
      run: bundle install
    - name: Debug draft socket fds
      run: |
        export LD_LIBRARY_PATH=$HOME/lib
        bundle exec ruby -e "
          require_relative 'lib/cztop'
          puts 'ZMQ: ' + CZMQ::FFI::ZMQ_VERSION
          puts 'CZMQ: ' + CZMQ::FFI::CZMQ_VERSION
          puts 'has_draft?: ' + CZMQ::FFI.has_draft?.to_s
          puts
          %w[REQ SERVER RADIO DISH].each do |type|
            begin
              klass = CZTop::Socket.const_get(type)
              s = klass.new
              fd = s.fd
              puts \"#{type}: fd=#{fd}\"
              io = IO.for_fd(fd, autoclose: false)
              puts \"#{type}: IO=#{io.inspect}\"
              s.close
            rescue => e
              puts \"#{type}: #{e.class}: #{e.message}\"
            end
          end
        "
    - name: Run tests
      run: |
        export LD_LIBRARY_PATH=$HOME/lib
        bundle exec rake
