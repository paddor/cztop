<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="spray">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="grayNoise"/>
      <feComponentTransfer in="grayNoise" result="mask">
        <feFuncA type="discrete" tableValues="0 0 0 0 1 1 1 1"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="mask" operator="in"/>
    </filter>
  </defs>
  <!-- Concrete wall background -->
  <rect width="480" height="320" fill="#d4cfc4"/>
  <rect width="480" height="320" fill="#00000008"/>
  <!-- Wall texture -->
  <g opacity="0.05">
    <rect x="0" y="0" width="480" height="2" fill="#000"/>
    <rect x="0" y="20" width="480" height="1" fill="#000"/>
    <rect x="0" y="55" width="480" height="1" fill="#000"/>
    <rect x="0" y="100" width="480" height="2" fill="#000"/>
    <rect x="0" y="150" width="480" height="1" fill="#000"/>
    <rect x="0" y="200" width="480" height="2" fill="#000"/>
    <rect x="0" y="260" width="480" height="1" fill="#000"/>
    <rect x="0" y="300" width="480" height="1" fill="#000"/>
  </g>
  <!-- Stencil spray paint style -->
  <g filter="url(#rough)">
    <!-- Main text - bold stencil -->
    <text x="240" y="165" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
          font-size="100" font-weight="900" fill="#cc2222" letter-spacing="-4">CZTop</text>
  </g>
  <!-- Drip effects -->
  <g fill="#cc2222" opacity="0.6">
    <rect x="152" y="170" width="3" height="25" rx="1.5"/>
    <rect x="270" y="168" width="2.5" height="35" rx="1.25"/>
    <rect x="330" y="172" width="2" height="20" rx="1"/>
    <rect x="112" y="170" width="2.5" height="18" rx="1.25"/>
  </g>
  <!-- Beard as dripping paint -->
  <g fill="#cc2222" opacity="0.5">
    <rect x="190" y="170" width="2.5" height="40" rx="1.25"/>
    <rect x="198" y="170" width="2.5" height="48" rx="1.25"/>
    <rect x="206" y="170" width="2.5" height="52" rx="1.25"/>
    <rect x="214" y="170" width="2.5" height="50" rx="1.25"/>
    <rect x="222" y="170" width="2.5" height="45" rx="1.25"/>
    <rect x="230" y="170" width="2.5" height="38" rx="1.25"/>
  </g>
  <!-- Network stencil -->
  <g opacity="0.4" filter="url(#rough)">
    <circle cx="80" cy="70" r="10" fill="none" stroke="#cc2222" stroke-width="3"/>
    <circle cx="400" cy="70" r="10" fill="none" stroke="#cc2222" stroke-width="3"/>
    <circle cx="80" cy="260" r="10" fill="none" stroke="#cc2222" stroke-width="3"/>
    <circle cx="400" cy="260" r="10" fill="none" stroke="#cc2222" stroke-width="3"/>
    <line x1="90" y1="70" x2="390" y2="70" stroke="#cc2222" stroke-width="2"/>
    <line x1="80" y1="80" x2="80" y2="250" stroke="#cc2222" stroke-width="2"/>
    <line x1="400" y1="80" x2="400" y2="250" stroke="#cc2222" stroke-width="2"/>
    <line x1="90" y1="260" x2="390" y2="260" stroke="#cc2222" stroke-width="2"/>
  </g>
  <!-- Small envelope stencils -->
  <g fill="#cc2222" opacity="0.5" filter="url(#rough)">
    <g transform="translate(240, 67)">
      <rect x="-8" y="-5" width="16" height="10" rx="1"/>
      <polygon points="-8,-5 0,2 8,-5" fill="#d4cfc4"/>
    </g>
    <g transform="translate(240, 263)">
      <rect x="-8" y="-5" width="16" height="10" rx="1"/>
      <polygon points="-8,-5 0,2 8,-5" fill="#d4cfc4"/>
    </g>
  </g>
  <text x="240" y="250" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
        font-size="14" fill="#cc2222" letter-spacing="6" opacity="0.6" filter="url(#rough)">ZEROMQ FOR RUBY</text>
</svg>
