<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#4488cc20" stroke-width="0.5"/>
    </pattern>
    <pattern id="gridLg" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#4488cc30" stroke-width="0.8"/>
    </pattern>
  </defs>
  <rect width="480" height="320" fill="#0d2137"/>
  <rect width="480" height="320" fill="url(#gridLg)"/>
  <rect width="480" height="320" fill="url(#grid)"/>
  <!-- Blueprint-style technical drawing of network -->
  <!-- Dimension lines -->
  <g stroke="#4488cc60" stroke-width="0.5" stroke-dasharray="4,2">
    <line x1="60" y1="50" x2="420" y2="50"/>
    <line x1="60" y1="50" x2="60" y2="270"/>
  </g>
  <!-- Network topology drawing -->
  <g stroke="#88bbee" stroke-width="1" fill="none">
    <!-- Nodes as technical circles -->
    <circle cx="100" cy="80" r="12"/><circle cx="100" cy="80" r="2" fill="#88bbee"/>
    <circle cx="380" cy="80" r="12"/><circle cx="380" cy="80" r="2" fill="#88bbee"/>
    <circle cx="100" cy="250" r="12"/><circle cx="100" cy="250" r="2" fill="#88bbee"/>
    <circle cx="380" cy="250" r="12"/><circle cx="380" cy="250" r="2" fill="#88bbee"/>
    <!-- Connection lines -->
    <line x1="112" y1="80" x2="368" y2="80"/>
    <line x1="100" y1="92" x2="100" y2="238"/>
    <line x1="380" y1="92" x2="380" y2="238"/>
    <line x1="112" y1="250" x2="368" y2="250"/>
  </g>
  <!-- Message arrows -->
  <g stroke="#ffcc02" stroke-width="1" fill="#ffcc02" opacity="0.7">
    <line x1="180" y1="77" x2="240" y2="77"/>
    <polygon points="240,74 248,77 240,80"/>
    <line x1="300" y1="253" x2="240" y2="253"/>
    <polygon points="240,250 232,253 240,256"/>
  </g>
  <!-- Main text -->
  <text x="240" y="165" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="70" font-weight="bold" fill="none" stroke="#88bbee" stroke-width="1.5"
        letter-spacing="4">CZTop</text>
  <!-- Beard as technical hatching under Z -->
  <g stroke="#88bbee" stroke-width="1" stroke-linecap="round" opacity="0.5">
    <line x1="195" y1="172" x2="190" y2="198"/><line x1="203" y1="172" x2="200" y2="200"/>
    <line x1="211" y1="172" x2="211" y2="202"/><line x1="219" y1="172" x2="222" y2="200"/>
    <line x1="227" y1="172" x2="232" y2="198"/>
  </g>
  <!-- Technical annotations -->
  <text x="100" y="70" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="8" fill="#4488cc">NODE_A</text>
  <text x="380" y="70" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="8" fill="#4488cc">NODE_B</text>
  <text x="100" y="275" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="8" fill="#4488cc">NODE_C</text>
  <text x="380" y="275" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="8" fill="#4488cc">NODE_D</text>
  <text x="240" y="200" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="10" fill="#4488cc" letter-spacing="4">ZEROMQ FOR RUBY</text>
  <!-- Revision block -->
  <g font-family="'Courier New', monospace" font-size="7" fill="#4488cc80">
    <text x="390" y="295">REV 2.0</text>
    <text x="390" y="305">CZMQ FFI</text>
  </g>
</svg>
