<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#8b0000"/>
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#333"/>
      <stop offset="40%" stop-color="#111"/>
      <stop offset="100%" stop-color="#222"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="480" height="320" fill="#f5f0e8"/>
  <!-- Socket connection metaphor: plugs connecting -->
  <g opacity="0.2">
    <!-- Left socket -->
    <rect x="30" y="72" width="50" height="30" rx="5" fill="none" stroke="#222" stroke-width="2.5"/>
    <rect x="80" y="79" width="18" height="6" rx="2" fill="#222"/>
    <rect x="80" y="87" width="18" height="6" rx="2" fill="#222"/>
    <!-- Right socket -->
    <rect x="400" y="72" width="50" height="30" rx="5" fill="none" stroke="#222" stroke-width="2.5"/>
    <rect x="382" y="79" width="18" height="6" rx="2" fill="#222"/>
    <rect x="382" y="87" width="18" height="6" rx="2" fill="#222"/>
    <!-- Connection line with spark -->
    <line x1="98" y1="87" x2="382" y2="87" stroke="#222" stroke-width="1.5" stroke-dasharray="8,4"/>
    <circle cx="240" cy="87" r="4" fill="#ffcc00"/>
    <g stroke="#ffcc00" stroke-width="1" opacity="0.6">
      <line x1="240" y1="79" x2="240" y2="75"/><line x1="240" y1="95" x2="240" y2="99"/>
      <line x1="234" y1="82" x2="230" y2="79"/><line x1="246" y1="82" x2="250" y2="79"/>
      <line x1="234" y1="92" x2="230" y2="95"/><line x1="246" y1="92" x2="250" y2="95"/>
    </g>
  </g>
  <!-- Sunglasses -->
  <g transform="translate(240, 90)" filter="url(#shadow)">
    <path d="M-15,0 Q0,-10 15,0" fill="none" stroke="#222" stroke-width="5"/>
    <ellipse cx="-48" cy="5" rx="42" ry="30" fill="url(#lens)" stroke="#222" stroke-width="3.5"/>
    <ellipse cx="48" cy="5" rx="42" ry="30" fill="url(#lens)" stroke="#222" stroke-width="3.5"/>
    <ellipse cx="-60" cy="-5" rx="10" ry="6" fill="#fff" opacity="0.12" transform="rotate(-20,-60,-5)"/>
    <ellipse cx="36" cy="-5" rx="10" ry="6" fill="#fff" opacity="0.12" transform="rotate(-20,36,-5)"/>
    <line x1="-90" y1="0" x2="-105" y2="-8" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="90" y1="0" x2="105" y2="-8" stroke="#222" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Thick long beard -->
  <g transform="translate(240, 126)">
    <g stroke="url(#redGrad)" stroke-linecap="round" fill="none">
      <path d="M-70,0 Q-78,48 -85,100 Q-88,125 -82,142" stroke-width="3.5"/>
      <path d="M-62,2 Q-68,52 -73,105 Q-76,133 -70,150" stroke-width="3.5"/>
      <path d="M-54,4 Q-58,55 -62,110 Q-64,140 -58,157" stroke-width="4"/>
      <path d="M-46,5 Q-48,58 -50,113 Q-52,145 -47,163" stroke-width="4"/>
      <path d="M-38,6 Q-38,62 -40,117 Q-41,150 -37,168" stroke-width="4.5"/>
      <path d="M-30,7 Q-28,65 -30,120 Q-31,155 -28,173" stroke-width="4.5"/>
      <path d="M-22,7 Q-20,68 -22,123 Q-23,158 -20,178" stroke-width="5"/>
      <path d="M-14,8 Q-12,70 -14,126 Q-14,162 -12,182" stroke-width="5"/>
      <path d="M-6,8 Q-4,71 -6,128 Q-6,164 -5,184" stroke-width="5"/>
      <path d="M2,8 Q4,71 2,128 Q2,164 3,184" stroke-width="5"/>
      <path d="M10,8 Q12,70 10,126 Q10,162 12,182" stroke-width="5"/>
      <path d="M18,7 Q20,68 18,123 Q19,158 20,178" stroke-width="5"/>
      <path d="M26,7 Q28,65 26,120 Q27,155 28,173" stroke-width="4.5"/>
      <path d="M34,6 Q36,62 34,117 Q35,150 37,168" stroke-width="4.5"/>
      <path d="M42,5 Q44,58 42,113 Q44,145 47,163" stroke-width="4"/>
      <path d="M50,4 Q54,55 52,110 Q56,140 58,157" stroke-width="4"/>
      <path d="M58,2 Q64,52 60,105 Q68,133 70,150" stroke-width="3.5"/>
      <path d="M66,0 Q72,48 68,100 Q78,125 82,142" stroke-width="3.5"/>
    </g>
  </g>
  <text x="240" y="282" text-anchor="middle" font-family="'Arial Black','Impact',sans-serif"
        font-size="48" font-weight="900" fill="#222" letter-spacing="3">CZTop</text>
  <text x="240" y="305" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="11" fill="#888" letter-spacing="3">ZEROMQ FOR RUBY</text>
</svg>
