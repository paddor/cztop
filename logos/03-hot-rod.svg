<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ff4500"/>
      <stop offset="40%" stop-color="#ff8c00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#ccc"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="70%" stop-color="#999"/>
      <stop offset="100%" stop-color="#ccc"/>
    </linearGradient>
    <filter id="drop">
      <feDropShadow dx="3" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="480" height="320" rx="16" fill="#1a0a00"/>
  <!-- Speed lines -->
  <g stroke="#ff450030" stroke-width="1.5" stroke-linecap="round">
    <line x1="20" y1="100" x2="120" y2="100"/><line x1="10" y1="130" x2="90" y2="130"/>
    <line x1="30" y1="160" x2="100" y2="160"/><line x1="15" y1="190" x2="110" y2="190"/>
    <line x1="25" y1="220" x2="95" y2="220"/>
    <line x1="360" y1="105" x2="460" y2="105"/><line x1="380" y1="135" x2="470" y2="135"/>
    <line x1="370" y1="165" x2="450" y2="165"/><line x1="385" y1="195" x2="465" y2="195"/>
    <line x1="375" y1="225" x2="455" y2="225"/>
  </g>
  <!-- Flame accents under text -->
  <g transform="translate(240, 190)" opacity="0.6">
    <ellipse cx="-60" cy="0" rx="15" ry="30" fill="url(#flame)" transform="rotate(-10)"/>
    <ellipse cx="-30" cy="0" rx="12" ry="35" fill="url(#flame)" transform="rotate(-5)"/>
    <ellipse cx="0" cy="0" rx="14" ry="38" fill="url(#flame)"/>
    <ellipse cx="30" cy="0" rx="12" ry="35" fill="url(#flame)" transform="rotate(5)"/>
    <ellipse cx="60" cy="0" rx="15" ry="30" fill="url(#flame)" transform="rotate(10)"/>
  </g>
  <!-- Main text with chrome effect -->
  <g transform="translate(240, 160)" filter="url(#drop)">
    <text text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
          font-size="95" font-weight="900" fill="url(#chrome)" letter-spacing="-3"
          stroke="#333" stroke-width="1">CZTop</text>
  </g>
  <!-- Beard as flame wisps -->
  <g transform="translate(215, 170)">
    <g stroke="url(#flame)" stroke-width="3" stroke-linecap="round" opacity="0.9">
      <line x1="-15" y1="5" x2="-22" y2="40"/><line x1="-7" y1="5" x2="-10" y2="45"/>
      <line x1="1" y1="5" x2="1" y2="48"/><line x1="9" y1="5" x2="10" y2="45"/>
      <line x1="17" y1="5" x2="22" y2="40"/><line x1="25" y1="5" x2="32" y2="35"/>
    </g>
  </g>
  <!-- Small message sparks -->
  <g fill="#ffd700" opacity="0.8">
    <circle cx="140" cy="80" r="3"/><circle cx="145" cy="75" r="1.5"/>
    <circle cx="340" cy="250" r="3"/><circle cx="335" cy="245" r="1.5"/>
    <circle cx="380" cy="70" r="2.5"/><circle cx="100" cy="240" r="2.5"/>
  </g>
  <text x="240" y="260" text-anchor="middle" font-family="'Georgia', serif"
        font-size="14" fill="#ff8c00" letter-spacing="3" font-style="italic">ZEROMQ FOR RUBY</text>
</svg>
