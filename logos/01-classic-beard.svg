<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="beardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8423f"/>
      <stop offset="100%" stop-color="#9b1d20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="msgGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="320" rx="16" fill="#1a1a2e"/>
  <g stroke="#ffffff08" stroke-width="0.5">
    <line x1="0" y1="80" x2="480" y2="80"/><line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="240" x2="480" y2="240"/><line x1="120" y1="0" x2="120" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="320"/><line x1="360" y1="0" x2="360" y2="320"/>
  </g>
  <g stroke="#e8423f" stroke-width="1" opacity="0.25">
    <line x1="68" y1="72" x2="410" y2="105"/><line x1="68" y1="72" x2="52" y2="248"/>
    <line x1="410" y1="105" x2="430" y2="252"/><line x1="52" y1="248" x2="430" y2="252"/>
    <line x1="68" y1="72" x2="430" y2="252"/><line x1="410" y1="105" x2="52" y2="248"/>
  </g>
  <g transform="translate(200, 82) rotate(-5)" filter="url(#msgGlow)" opacity="0.9">
    <rect x="-8" y="-5" width="16" height="11" rx="1.5" fill="#ffcc02" stroke="#e8a902" stroke-width="0.5"/>
    <polyline points="-8,-5 0,2 8,-5" fill="none" stroke="#e8a902" stroke-width="0.8"/>
  </g>
  <g transform="translate(250, 255) rotate(2)" filter="url(#msgGlow)" opacity="0.8">
    <rect x="-7" y="-4.5" width="14" height="9" rx="1.5" fill="#ffcc02" stroke="#e8a902" stroke-width="0.5"/>
    <polyline points="-7,-4.5 0,1.5 7,-4.5" fill="none" stroke="#e8a902" stroke-width="0.8"/>
  </g>
  <g transform="translate(425, 178) rotate(80)" filter="url(#msgGlow)" opacity="0.7">
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#ffcc02" stroke="#e8a902" stroke-width="0.5"/>
    <polyline points="-6,-4 0,1 6,-4" fill="none" stroke="#e8a902" stroke-width="0.7"/>
  </g>
  <g transform="translate(56, 160) rotate(100)" filter="url(#msgGlow)" opacity="0.7">
    <rect x="-6" y="-4" width="12" height="8" rx="1" fill="#ffcc02" stroke="#e8a902" stroke-width="0.5"/>
    <polyline points="-6,-4 0,1 6,-4" fill="none" stroke="#e8a902" stroke-width="0.7"/>
  </g>
  <g transform="translate(240, 165)">
    <text x="2" y="2" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
          font-size="88" font-weight="900" fill="#000" opacity="0.4" letter-spacing="-2">CZTop</text>
    <text text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif"
          font-size="88" font-weight="900" fill="#e0e0e0" letter-spacing="-2">C<tspan fill="url(#beardGrad)">Z</tspan>Top</text>
    <g stroke="url(#beardGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
      <line x1="-42" y1="8" x2="-50" y2="42"/><line x1="-36" y1="8" x2="-40" y2="46"/>
      <line x1="-30" y1="8" x2="-30" y2="48"/><line x1="-24" y1="8" x2="-20" y2="46"/>
      <line x1="-18" y1="8" x2="-12" y2="42"/><line x1="-12" y1="8" x2="-4" y2="38"/>
    </g>
  </g>
  <text x="240" y="238" text-anchor="middle" font-family="'Courier New', monospace"
        font-size="13" fill="#888" letter-spacing="4">ZEROMQ FOR RUBY</text>
  <g filter="url(#glow)">
    <circle cx="68" cy="72" r="8" fill="#1a1a2e" stroke="#e8423f" stroke-width="2"/>
    <circle cx="68" cy="72" r="3" fill="#e8423f"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="410" cy="105" r="8" fill="#1a1a2e" stroke="#e8423f" stroke-width="2"/>
    <circle cx="410" cy="105" r="3" fill="#e8423f"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="52" cy="248" r="8" fill="#1a1a2e" stroke="#e8423f" stroke-width="2"/>
    <circle cx="52" cy="248" r="3" fill="#e8423f"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="430" cy="252" r="8" fill="#1a1a2e" stroke="#e8423f" stroke-width="2"/>
    <circle cx="430" cy="252" r="3" fill="#e8423f"/>
  </g>
</svg>
