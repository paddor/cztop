name: CI

on: [push, pull_request]

jobs:
  stable:
    name: Ruby ${{ matrix.ruby }} (stable API)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install CZMQ
      run: sudo apt-get install -y libczmq-dev
    - name: Install dependencies
      run: bundle install
    - name: Run tests
      run: bundle exec rake

  draft:
    name: Ruby ${{ matrix.ruby }} (draft API)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.3', '4.0']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby ${{ matrix.ruby }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
    - name: Install ZMQ and CZMQ from source (with draft APIs)
      run: |
        export PKG_CONFIG_PATH=$HOME/lib/pkgconfig
        env ZMQ_VERSION=v4.3.5 ci/install-libzmq
        env CZMQ_VERSION=v4.2.1 ci/install-libczmq
    - name: Install dependencies
      run: bundle install
    - name: Debug draft socket fds
      run: |
        export LD_LIBRARY_PATH=$HOME/lib
        bundle exec ruby -e '
          require "ffi"
          require_relative "lib/cztop"

          # attach zmq_getsockopt for direct testing
          module DebugFFI
            extend FFI::Library
            ffi_lib "zmq"
            attach_function :zmq_getsockopt, [:pointer, :int, :pointer, :pointer], :int
          end

          puts "ZMQ: #{CZMQ::FFI::ZMQ_VERSION}"
          puts "CZMQ: #{CZMQ::FFI::CZMQ_VERSION}"
          puts "has_draft?: #{CZMQ::FFI.has_draft?}"
          puts "ffi_libraries: #{CZMQ::FFI.ffi_libraries.map(&:name)}"
          puts

          %w[REQ SERVER RADIO DISH].each do |type|
            begin
              klass = CZTop::Socket.const_get(type)
              s = klass.new
              zsock_ptr = s.ffi_delegate.to_ptr
              puts "#{type}: zsock_ptr=#{zsock_ptr.inspect}"

              resolved = CZMQ::FFI.zsock_resolve(zsock_ptr)
              puts "#{type}: resolved=#{resolved.inspect} null?=#{resolved.null?}"

              fd_via_czmq = CZMQ::FFI.zsock_fd(zsock_ptr)
              puts "#{type}: zsock_fd=#{fd_via_czmq}"

              # direct zmq_getsockopt(resolved, ZMQ_FD=14, &fd, &len)
              fd_buf = FFI::MemoryPointer.new(:int)
              len_buf = FFI::MemoryPointer.new(:size_t)
              len_buf.write(:size_t, FFI.type_size(:int))
              rc = DebugFFI.zmq_getsockopt(resolved, 14, fd_buf, len_buf)
              puts "#{type}: direct zmq_getsockopt rc=#{rc} fd=#{fd_buf.read_int} len=#{len_buf.read(:size_t)}"

              s.close
            rescue => e
              puts "#{type}: ERROR #{e.class}: #{e.message}"
              puts e.backtrace.first(3).map { |l| "  #{l}" }.join("\n")
            end
            puts
          end
        '
    - name: Run tests
      run: |
        export LD_LIBRARY_PATH=$HOME/lib
        bundle exec rake
