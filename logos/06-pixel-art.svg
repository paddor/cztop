<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#16161d"/>
  <!-- Pixel grid effect -->
  <defs>
    <pattern id="pixels" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none" stroke="#ffffff06" stroke-width="0.25"/>
    </pattern>
  </defs>
  <rect width="480" height="320" fill="url(#pixels)"/>
  <!-- Pixel art C -->
  <g fill="#e8423f">
    <rect x="76" y="100" width="8" height="8"/><rect x="84" y="100" width="8" height="8"/>
    <rect x="92" y="100" width="8" height="8"/><rect x="100" y="100" width="8" height="8"/>
    <rect x="68" y="108" width="8" height="8"/><rect x="76" y="108" width="8" height="8"/>
    <rect x="68" y="116" width="8" height="8"/><rect x="68" y="124" width="8" height="8"/>
    <rect x="68" y="132" width="8" height="8"/><rect x="68" y="140" width="8" height="8"/>
    <rect x="68" y="148" width="8" height="8"/><rect x="76" y="148" width="8" height="8"/>
    <rect x="76" y="156" width="8" height="8"/><rect x="84" y="156" width="8" height="8"/>
    <rect x="92" y="156" width="8" height="8"/><rect x="100" y="156" width="8" height="8"/>
  </g>
  <!-- Pixel art Z (bright red) -->
  <g fill="#ff5555">
    <rect x="120" y="100" width="8" height="8"/><rect x="128" y="100" width="8" height="8"/>
    <rect x="136" y="100" width="8" height="8"/><rect x="144" y="100" width="8" height="8"/>
    <rect x="152" y="100" width="8" height="8"/>
    <rect x="144" y="108" width="8" height="8"/><rect x="136" y="116" width="8" height="8"/>
    <rect x="128" y="124" width="8" height="8"/><rect x="136" y="132" width="8" height="8"/>
    <rect x="128" y="140" width="8" height="8"/><rect x="120" y="148" width="8" height="8"/>
    <rect x="120" y="156" width="8" height="8"/><rect x="128" y="156" width="8" height="8"/>
    <rect x="136" y="156" width="8" height="8"/><rect x="144" y="156" width="8" height="8"/>
    <rect x="152" y="156" width="8" height="8"/>
  </g>
  <!-- Pixel beard under Z -->
  <g fill="#ff5555" opacity="0.6">
    <rect x="124" y="164" width="4" height="4"/><rect x="122" y="168" width="4" height="4"/>
    <rect x="120" y="172" width="4" height="4"/>
    <rect x="132" y="164" width="4" height="4"/><rect x="132" y="168" width="4" height="4"/>
    <rect x="132" y="172" width="4" height="4"/><rect x="132" y="176" width="4" height="4"/>
    <rect x="140" y="164" width="4" height="4"/><rect x="142" y="168" width="4" height="4"/>
    <rect x="144" y="172" width="4" height="4"/>
    <rect x="148" y="164" width="4" height="4"/><rect x="150" y="168" width="4" height="4"/>
  </g>
  <!-- Pixel art T -->
  <g fill="#e8423f">
    <rect x="172" y="100" width="8" height="8"/><rect x="180" y="100" width="8" height="8"/>
    <rect x="188" y="100" width="8" height="8"/><rect x="196" y="100" width="8" height="8"/>
    <rect x="204" y="100" width="8" height="8"/>
    <rect x="188" y="108" width="8" height="8"/><rect x="188" y="116" width="8" height="8"/>
    <rect x="188" y="124" width="8" height="8"/><rect x="188" y="132" width="8" height="8"/>
    <rect x="188" y="140" width="8" height="8"/><rect x="188" y="148" width="8" height="8"/>
    <rect x="188" y="156" width="8" height="8"/>
  </g>
  <!-- Pixel art o -->
  <g fill="#e8423f">
    <rect x="228" y="116" width="8" height="8"/><rect x="236" y="116" width="8" height="8"/>
    <rect x="220" y="124" width="8" height="8"/><rect x="244" y="124" width="8" height="8"/>
    <rect x="220" y="132" width="8" height="8"/><rect x="244" y="132" width="8" height="8"/>
    <rect x="220" y="140" width="8" height="8"/><rect x="244" y="140" width="8" height="8"/>
    <rect x="220" y="148" width="8" height="8"/><rect x="244" y="148" width="8" height="8"/>
    <rect x="228" y="156" width="8" height="8"/><rect x="236" y="156" width="8" height="8"/>
  </g>
  <!-- Pixel art p -->
  <g fill="#e8423f">
    <rect x="268" y="116" width="8" height="8"/><rect x="276" y="116" width="8" height="8"/>
    <rect x="284" y="116" width="8" height="8"/>
    <rect x="268" y="124" width="8" height="8"/><rect x="292" y="124" width="8" height="8"/>
    <rect x="268" y="132" width="8" height="8"/><rect x="292" y="132" width="8" height="8"/>
    <rect x="268" y="140" width="8" height="8"/><rect x="276" y="140" width="8" height="8"/>
    <rect x="284" y="140" width="8" height="8"/>
    <rect x="268" y="148" width="8" height="8"/>
    <rect x="268" y="156" width="8" height="8"/>
    <rect x="268" y="164" width="8" height="8"/>
  </g>
  <!-- Pixel nodes and messages -->
  <g fill="#ffcc02">
    <rect x="340" y="88" width="6" height="6"/>
    <rect x="360" y="140" width="6" height="6"/>
    <rect x="380" y="180" width="6" height="6"/>
    <rect x="340" y="200" width="6" height="6"/>
  </g>
  <g stroke="#ffcc0240" stroke-width="1">
    <line x1="343" y1="94" x2="363" y2="140"/>
    <line x1="366" y1="146" x2="383" y2="180"/>
    <line x1="383" y1="186" x2="343" y2="200"/>
    <line x1="343" y1="94" x2="343" y2="200"/>
  </g>
  <!-- Small pixel envelopes -->
  <g fill="#ffcc02" opacity="0.8">
    <rect x="352" y="114" width="5" height="3"/>
    <rect x="370" y="162" width="5" height="3"/>
  </g>
  <text x="240" y="220" text-anchor="middle" font-family="monospace"
        font-size="10" fill="#666" letter-spacing="4">ZEROMQ FOR RUBY</text>
</svg>
